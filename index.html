<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aerofor — Mapa de Subdealers</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #header { background: #0f1923; color: white; padding: 10px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    #header img { height: 36px; width: auto; }
    #header-title { font-size: 15px; font-weight: 600; color: #e0e0e0; white-space: nowrap; }
    #search-box { display: flex; gap: 8px; flex: 1; max-width: 420px; margin-left: auto; }
    #search-input { flex: 1; padding: 8px 12px; border: 1px solid #2e4a5e; border-radius: 6px; font-size: 14px; outline: none; background: #1e2d3d; color: white; }
    #search-input::placeholder { color: #7a9bb5; }
    #search-btn { padding: 8px 16px; background: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    #search-btn:hover { background: #388e3c; }

    #map { flex: 1; }
    #status-bar { background: #0f1923; color: #7a9bb5; font-size: 12px; padding: 5px 16px; text-align: center; }

    .legend { background: white; border-radius: 8px; padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 12px; line-height: 2; }
    .legend-title { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin-bottom: 2px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-color { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; }

    .popup-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; color: #0f1923; border-bottom: 2px solid #4caf50; padding-bottom: 5px; }
    .popup-row { display: flex; gap: 6px; margin-bottom: 3px; font-size: 13px; }
    .popup-label { color: #888; min-width: 75px; flex-shrink: 0; font-size: 12px; }
    .popup-value { color: #222; font-weight: 500; }
    .popup-value a { color: #4caf50; text-decoration: none; }
    .popup-unassigned { color: #aaa; font-style: italic; font-size: 13px; margin-top: 4px; }
    .popup-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
    .badge-asignado { background: #e8f5e9; color: #2e7d32; }
    .badge-sin-asignar { background: #fce4ec; color: #c62828; }
  </style>
</head>
<body>

<div id="header">
  <img src="logo.png" alt="Aerofor" onerror="this.style.display='none'" />
  <span id="header-title">Subdealers</span>
  <div id="search-box">
    <input id="search-input" type="text" placeholder="Municipio o código postal..." />
    <button id="search-btn">Buscar</button>
  </div>
</div>

<div id="map"></div>
<div id="status-bar">Cargando mapa...</div>

<script>
const SHEET_PROVINCIAS_URL = 'PENDIENTE_URL_SHEET_PROVINCIAS';
const SHEET_COMARCAS_URL   = 'PENDIENTE_URL_SHEET_COMARCAS';

const COLOR = {
  asignado:    { fill: '#4caf50', border: '#2e7d32' },
  colindante:  { fill: '#ff9800', border: '#e65100' },
  sin_asignar: { fill: '#f44336', border: '#b71c1c' },
  comarca:     { fill: '#2196f3', border: '#0d47a1' },
  neutro:      { fill: '#90a4ae', border: '#546e7a' }
};

let datosProvincias = {};
let datosComarcas   = {};
let geojsonProvincias = null;
let searchMarker = null;

const map = L.map('map').setView([40.4, -3.7], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 18
}).addTo(map);

function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div class="legend-title">Cobertura</div>
    <div class="legend-item"><div class="legend-color" style="background:${COLOR.asignado.fill}"></div>Con subdealer</div>
    <div class="legend-item"><div class="legend-color" style="background:${COLOR.colindante.fill}"></div>Zona colindante</div>
    <div class="legend-item"><div class="legend-color" style="background:${COLOR.sin_asignar.fill}"></div>Sin asignar</div>
  `;
  return div;
};

async function cargarDatosSheet() {
  if (SHEET_PROVINCIAS_URL === 'PENDIENTE_URL_SHEET_PROVINCIAS') return;
  try {
    const [resP, resC] = await Promise.all([fetch(SHEET_PROVINCIAS_URL), fetch(SHEET_COMARCAS_URL)]);
    Papa.parse(await resP.text(), { header: true, skipEmptyLines: true, complete: r => r.data.forEach(row => { if (row.Provincia) datosProvincias[row.Provincia.trim()] = row; }) });
    Papa.parse(await resC.text(), { header: true, skipEmptyLines: true, complete: r => r.data.forEach(row => { if (row.Comarca) datosComarcas[row.Comarca.trim()] = row; }) });
  } catch(e) { setStatus('Error cargando Sheet'); console.error(e); }
}

function calcularColindantes(geojson) {
  const asignadas = new Set();
  geojson.features.forEach(f => { if (datosProvincias[f.properties['Texto']]?.Subdealer?.trim()) asignadas.add(f.properties['Texto']); });
  const colindantes = new Set();
  geojson.features.forEach(f => {
    const n = f.properties['Texto'];
    if (asignadas.has(n)) return;
    for (const g of geojson.features) {
      if (!asignadas.has(g.properties['Texto'])) continue;
      try { if (turf.booleanIntersects(f, g)) { colindantes.add(n); break; } } catch(e) {}
    }
  });
  return { asignadas, colindantes };
}

function colorProvincia(nombre, asignadas, colindantes) {
  if (asignadas.has(nombre))   return COLOR.asignado;
  if (colindantes.has(nombre)) return COLOR.colindante;
  return COLOR.sin_asignar;
}

function popupProvincia(nombre) {
  const d = datosProvincias[nombre];
  const asignado = d?.Subdealer?.trim();
  return `
    <div class="popup-title">${nombre}</div>
    <div class="popup-badge ${asignado ? 'badge-asignado' : 'badge-sin-asignar'}">${asignado ? '✓ Subdealer asignado' : '✗ Sin asignar'}</div>
    ${asignado ? `
      ${d.Subdealer ? `<div class="popup-row"><span class="popup-label">Subdealer</span><span class="popup-value">${d.Subdealer}</span></div>` : ''}
      ${d.Contacto  ? `<div class="popup-row"><span class="popup-label">Contacto</span><span class="popup-value">${d.Contacto}</span></div>` : ''}
      ${d.Teléfono  ? `<div class="popup-row"><span class="popup-label">Teléfono</span><span class="popup-value"><a href="tel:${d.Teléfono}">${d.Teléfono}</a></span></div>` : ''}
      ${d.Email     ? `<div class="popup-row"><span class="popup-label">Email</span><span class="popup-value"><a href="mailto:${d.Email}">${d.Email}</a></span></div>` : ''}
      ${d.Cultivos_Principales ? `<div class="popup-row"><span class="popup-label">Cultivos</span><span class="popup-value">${d.Cultivos_Principales}</span></div>` : ''}
      ${d.Notas     ? `<div class="popup-row"><span class="popup-label">Notas</span><span class="popup-value">${d.Notas}</span></div>` : ''}
    ` : '<div class="popup-unassigned">Esta provincia no tiene subdealer asignado todavía.</div>'}
  `;
}

map.on('click', function(e) {
  if (!geojsonProvincias) return;
  const point = turf.point([e.latlng.lng, e.latlng.lat]);
  for (const feature of geojsonProvincias.features) {
    try {
      if (turf.booleanPointInPolygon(point, feature)) {
        const nombre = feature.properties['Texto'];
        L.popup().setLatLng(e.latlng).setContent(popupProvincia(nombre)).openOn(map);
        setStatus(`Provincia: ${nombre}`);
        return;
      }
    } catch(err) {}
  }
});

async function buscar() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  setStatus(`Buscando "${query}"...`);
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', España')}&format=json&limit=1&countrycodes=es`, { headers: { 'Accept-Language': 'es' } });
    const data = await res.json();
    if (!data.length) { setStatus('No encontrado'); return; }
    const { lat, lon, display_name } = data[0];
    map.setView([lat, lon], 10);
    if (searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker([lat, lon]).addTo(map);
    if (geojsonProvincias) {
      const point = turf.point([parseFloat(lon), parseFloat(lat)]);
      for (const feature of geojsonProvincias.features) {
        try {
          if (turf.booleanPointInPolygon(point, feature)) {
            const nombre = feature.properties['Texto'];
            searchMarker.bindPopup(popupProvincia(nombre)).openPopup();
            setStatus(`${display_name.split(',')[0]} — Provincia: ${nombre}`);
            return;
          }
        } catch(err) {}
      }
    }
    searchMarker.bindPopup(`<b>${display_name.split(',')[0]}</b>`).openPopup();
  } catch(e) { setStatus('Error en la búsqueda'); }
}

document.getElementById('search-btn').addEventListener('click', buscar);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

function renderizarCapas(geoProv, geoComarc) {
  const { asignadas, colindantes } = calcularColindantes(geoProv);

  const layerProvincias = L.geoJSON(geoProv, {
    style: () => ({ fillColor: COLOR.neutro.fill, fillOpacity: 0.35, color: COLOR.neutro.border, weight: 1.2 }),
    onEachFeature: (feature, layer) => {
      layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.6 }));
      layer.on('mouseout',  () => layer.setStyle({ fillOpacity: 0.35 }));
    }
  }).addTo(map);

  const layerCobertura = L.geoJSON(geoProv, {
    style: feature => {
      const c = colorProvincia(feature.properties['Texto'], asignadas, colindantes);
      return { fillColor: c.fill, fillOpacity: 0.5, color: c.border, weight: 1.2 };
    },
    onEachFeature: (feature, layer) => {
      layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.75 }));
      layer.on('mouseout',  () => {
        const c = colorProvincia(feature.properties['Texto'], asignadas, colindantes);
        layer.setStyle({ fillColor: c.fill, fillOpacity: 0.5 });
      });
    }
  });

  const layerComarcas = L.geoJSON(geoComarc, {
    style: () => ({ fillColor: COLOR.comarca.fill, fillOpacity: 0.1, color: COLOR.comarca.border, weight: 0.7, dashArray: '3 4' })
  });

  L.control.layers(null, {
    '🗺 Provincias': layerProvincias,
    '🎨 Cobertura (verde/naranja/rojo)': layerCobertura,
    '🌾 Comarcas agrarias': layerComarcas
  }, { collapsed: false, position: 'topright' }).addTo(map);

  legend.addTo(map);
  setStatus('Mapa listo · Haz clic en cualquier provincia o busca un municipio');
}

async function init() {
  setStatus('Cargando GeoJSON...');
  try {
    const [resP, resC] = await Promise.all([
      fetch('data/provincias_spain.geojson'),
      fetch('data/comarcas-agrarias.geojson')
    ]);
    if (!resP.ok) throw new Error(`provincias.geojson no encontrado (${resP.status})`);
    if (!resC.ok) throw new Error(`comarcas-agrarias.geojson no encontrado (${resC.status})`);
    geojsonProvincias = await resP.json();
    const geojsonComarcas = await resC.json();
    await cargarDatosSheet();
    renderizarCapas(geojsonProvincias, geojsonComarcas);
  } catch(e) {
    setStatus(`Error: ${e.message}`);
    console.error(e);
  }
}

init();
</script>
</body>
</html>
